name: E2E Environment Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run check:e2e-env

